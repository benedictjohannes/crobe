name: Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Run tests
        run: make test

      - name: Build all binaries
        run: |
          make build
          make build-builder

      - name: Run E2E Tests
        run: make test-e2e

      - name: Upload E2E Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-artifacts-${{ github.sha }}
          path: |
            reports/
            test-e2e/*.baked.yaml

      - name: Generate Schema
        run: make schema

      - name: Generate Coverage Assets
        run: make test-coverage-report

      - name: Deploy Coverage to Branch
        if: github.ref == 'refs/heads/master'
        run: |
          # Copy assets to a temp location to keep workspace clean
          mkdir /tmp/coverage-assets
          cp coverage.html coverage.json /tmp/coverage-assets/
          
          cd /tmp/coverage-assets
          git init
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git checkout -b coverage
          git add .
          git commit -m "Update coverage assets [skip ci]"
          git push origin coverage --force

      - name: Create/Update GitHub Release (Tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            crobe-linux
            crobe-windows.exe
            crobe-mac-intel
            crobe-mac-arm
            crobe-builder-linux
            crobe-builder-windows.exe
            crobe-builder-mac-intel
            crobe-builder-mac-arm
            playbook.schema.json
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Create/Update Master Release (Latest)
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest_build
          name: Latest Build (Master)
          body: |
            This is an automated build from the latest commit on the `master` branch.
            Last updated: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.sha }}
          files: |
            crobe-linux
            crobe-windows.exe
            crobe-mac-intel
            crobe-mac-arm
            crobe-builder-linux
            crobe-builder-windows.exe
            crobe-builder-mac-intel
            crobe-builder-mac-arm
            playbook.schema.json
            coverage.html
            coverage.json
          prerelease: true
          make_latest: false
