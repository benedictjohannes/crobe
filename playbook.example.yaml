# yaml-language-server: $schema=./playbook.schema.json
title: "Advanced Compliance Playbook Example (Feature Showcase)"
# Optional: this would be merged into the generated markdown report's YAML frontmatter.
# Values here override defaults. Title and Date are added automatically if not specified.
reportFrontmatter:
  author: "SRE Team"
  classification: "confidential"

# Core Concepts:
# 1. Sections: Logical groups of assertions (e.g., "System Foundation", "Identity").
# 2. Assertions: Individual check units with their own Pass/Fail verdict.
# 3. Context (AssertionContext): 
#    - Data gathered via gather is stored in a local context.
#    - SCOPE: Strictly per-assertion. Data is NOT shared between different assertions.
#    - LIFECYCLE: Persists across preCmds, cmds, and postCmds within the same assertion.
#    - USAGE: Can be used to drive dynamic logic in subsequent commands via JavaScript.
sections:
  - title: "1. System Foundation"
    description: 
      - "Checks fundamental operating system properties and kernel versions."
    assertions:
      - code: KERNEL_MODERN
        title: "Kernel Versioning"
        description: "Verify the system is running a security-patched kernel (v6.0+)."
        cmds:
          - exec:
              # script is the primary way to run shell commands.
              script: "uname -r"
            stdOutRule:
              # regex evaluates stdout. Simple match = Pass (1), No match = Fail (-1).
              regex: "^[6-9]\\."
            # passScore and failScore (Optional) allow for weighted results. Defaults to 1 and -1 respectively.
            passScore: 2
            failScore: -1
        # minPassingScore (Optional, Default: 1) determines the assertion verdict.
        minPassingScore: 1
        passDescription: "System is running a modern, supported kernel."
        failDescription: "Kernel version is outdated; potential security risk."

  - title: "2. Identity Tracking"
    description:
      - "Audits user identity and shell configurations."
    assertions:
      - code: SHELL_AUDIT
        title: "Login Shell Validation"
        description: "Ensures the current user is assigned a standard Bourne-compatible shell."
        # preCmds (Optional) run before main commands; results aren't reported.
        preCmds:
          - script: "echo 'Starting user audit...'"
        cmds:
          - exec:
              script: "whoami"
              # gather extracts data into assertionContext for use in later commands within the SAME assertion.
              # This context persists per-assertion and is NOT shared globally across the playbook.
              gather:
                - key: "current_user"
                  regex: "(.+)"
            passScore: 0
          - exec:
              # func in an exec block uses JS to generate a dynamic shell script. It takes precedence over script.
              func: |
                ({ assertionContext }) => {
                  return "getent passwd " + assertionContext.current_user + " | cut -d: -f7"
                }
            stdOutRule:
              regex: "/bin/(bash|zsh)"
              # includeStdErr (Optional, Default: false) allows checking stderr if stdout is empty.
              includeStdErr: false
        # postCmds (Optional) run after all commands in the assertion settle.
        postCmds:
          - script: "echo 'User audit complete.'"
        passDescription: "The assigned login shell meets security standards."
        failDescription: "The user is assigned a non-standard or restricted shell."

  - title: "3. Application Security"
    description:
      - "Audits application configurations and secrets management."
    assertions:
      - code: SECRET_VISIBILITY
        title: "Secret Key Permissions"
        description: "Checks for the presence of a secret key without leaking it to reports."
        cmds:
          - exec:
              script: "grep 'SECRET_KEY' /etc/app/config.env"
              # excludeFromReport prevents the command output from appearing in the log/markdown reports.
              excludeFromReport: true
              gather:
                - key: "raw_key"
                  regex: "=(.*)"
                  # excludeFromReport prevents this value from appearing in the JSON reports.
                  excludeFromReport: true
                - key: "secret_key"
                  # func takes precedence over regex.
                  func: (stdout, stderr, assertionContext) => stdout.split("=")[1]?.trim()
            # exitCodeRules allow mapping specific exit codes to pass/fail/neutral scores.
            # the first match's result wins
            exitCodeRules:
              - min: 0
                max: 0
                result: 1 # Pass
              - min: 1
                max: 1
                result: 0 # Neutral (e.g. key missing is not a failure here)
              - result: -1 # All other exit codes are failures
        passDescription: "Security configuration file was handled correctly."
        failDescription: "A system error occurred while accessing security configurations."

  - title: "4. Cross-Platform Logic"
    description:
      - "Audits environment variables across different operating systems."
    assertions:
      - code: CROSS_OS_HOME
        title: "Home Directory Resolution"
        description: "Validates that the HOME variable is resolvable regardless of the OS."
        cmds:
          - exec:
              # func can be used to generate a dynamic script
              func: |
                ({ 
                  assertionContext, // object filled by gather (see above)
                  env, // object filled by os.environ
                  os, // string
                  arch, // string
                  user, // string
                  cwd // string
                 }) => {
                  if (os === 'linux' || os === 'mac') return "echo $HOME";
                  if (os === 'windows') return "echo %USERPROFILE%";
                  return "echo unknown";
                }
              # shell can explicitly target 'bash', 'sh', 'powershell', or other executors like python3, node, etc.
              # defaults to 
              #  - windows: pwsh (falls back to powershell if not found)
              #  - mac: zsh
              #  - linux and others: bash
              # Note that for bash and powershell, set -o pipefail and $ErrorActionPreference = 'Stop' is added to catch execution errors.
              # Specify to "!" to execute the script directly as cmd and args, without a shell.
              shell: "bash"
              # Extension for the temporary script file (eg: sh, ps1, py, js). Optional. 
              # If not specified, defaults to 'sh' for bash/sh/zsh, 'ps1' for powershell/pwsh, and empty for others.
              scriptFileExtension: "sh"
            # stdOutRule allows evaluating the stdout and stderr for scoring.
            # If specified and returns -1 or 1, , stdOutRule takes precedence over exitCodeRules.
            stdOutRule:
              # A JS 'func' in a rule must return -1 (fail), 0 (neutral), or 1 (pass).
              func: |
                (stdout, stderr, assertionContext) => {
                  return stdout.trim().length > 0 ? 1 : 0;
                }
        passDescription: "User home directory path was successfully identified."
        failDescription: "Could not resolve the user home directory."

  - title: "5. Network & Services"
    description:
      - "Audits network configurations and connectivity."
    assertions:
      - code: DNS_RESOLVABLE
        title: "DNS Resolution Check"
        description: "Ensures the system can resolve external hostnames."
        cmds:
          - exec:
              script: "nslookup google.com"
            # stdErrRule allows evaluating the stdout and stderr for scoring.
            # If specified and returns -1 or 1, stdErrRule takes precedence over stdOutRule.
            stdErrRule:
              func: |
                (stdout, stderr, assertionContext) => {
                  return stderr.includes("connection timed out") ? -1 : 0;
                }
            stdOutRule:
              regex: "Address: "
        passDescription: "DNS resolution is working correctly."
        failDescription: "DNS resolution failed; check network settings or DNS servers."

# sets the report destination: folder (default, write to folder) or https (send to remote server)
reportDestination: folder
# folder in which reports would be written if reportdestination is folder. Defaults to "reports".
reportDestinationFolder: "my-audit-reports"
# must be configured if reportdestination is https
reportDestinationHttps:
  url: https://config.internal.company.com/compliance/submission
  # multipart (default) or json
  format: json
  # if specified, will be used to generate a signature for the report files
  signatureSecret: DontWorryBeJoyful
  # optional additional headers that will be included in the request
  additionalHeaders:
    X-Custom-Header: "Custom Value"
